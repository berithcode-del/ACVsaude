version: '3.8'

services:
  acvsaude-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - CORS_ORIGIN=*
      - DB_PATH=/data/acvsaude.db
    volumes:
      - acvsaude-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Opcional: PostgreSQL para produção
  # postgres:
  #   image: postgres:16-alpine
